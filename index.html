<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalizarea Romsilva</title>
    <style>
        :root { --primary: #173f31; --accent: #2d6a4f; --slate: #1e293b; --border: #e2e8f0; --vodafone: #e60000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: var(--slate); }
        .deck { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; padding: 20px; }
        .slide { background: #fff; min-height: 900px; display: grid; grid-template-rows: auto 1fr auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        
        .header { padding: 25px 45px; border-bottom: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 800; font-size: 1.1rem; color: var(--primary); text-transform: uppercase; }
        .smis-tag { font-size: 0.85rem; font-weight: 700; color: #fff; background: var(--vodafone); padding: 5px 15px; }

        .main-layout { display: grid; grid-template-columns: 550px 1fr; height: 100%; }
        .specs-panel { padding: 45px; border-right: 1px solid var(--border); background: #fcfcfc; overflow-y: auto; }
        
        h1 { font-size: 2.1rem; color: var(--primary); font-weight: 900; line-height: 1.1; }
        h2 { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }

        /* FIX MEDIA - FARA CROP */
        .media-panel { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Imaginile si Videourile vor fi afisate integral, fara sa fie taiate */
        .media-panel img, .media-panel video { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto; 
            height: auto; 
            object-fit: contain !important; /* ACESTA ESTE FIX-UL PT IMAGE_53 SI RESTUL */
        }

        .alert-box { background: #f8fafc; border-left: 5px solid var(--primary); padding: 20px; margin-top: 20px; }
        .final-slide { background: var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; padding: 100px; }
    </style>
</head>
<body>

<div class="deck">

    <section class="slide">
        <div class="header"><div class="brand">Context Operațional</div><div class="smis-tag">3.1 MILIOANE HA</div></div>
        <div class="main-layout">
            <div class="specs-panel">
                <h2>Digital Twin</h2>
                <h1>Romsilva 14</h1>
                <div class="alert-box">Monitorizare live prin drone.</div>
            </div>
            <div class="media-panel">
                <video autoplay muted loop playsinline preload="auto">
                    <source src="https://drive.google.com/uc?export=download&id=ID_VIDEO_14" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <section class="slide">
        <div class="header"><div class="brand">SOS & SECURITATE</div><div class="smis-tag">TRUE NORTH</div></div>
        <div class="main-layout">
            <div class="specs-panel">
                <h2>Securitate</h2>
                <h1>RECONN SIGINT</h1>
                <p>Dashboard monitorizare acces.</p>
            </div>
            <div class="media-panel">
                <img src="https://drive.google.com/uc?export=download&id=ID_IMAGE_53" alt="SOS Dashboard">
            </div>
        </div>
    </section>

    <section class="slide">
        <div class="header"><div class="brand">Demonstrare Tehnică</div><div class="smis-tag">PoC</div></div>
        <div class="main-layout">
            <div class="specs-panel">
                <h1>Validare Flux Date</h1>
                <p>Integrare completa.</p>
            </div>
            <div class="media-panel">
                <video autoplay muted loop playsinline preload="auto">
                    <source src="https://drive.google.com/uc?export=download&id=ID_VIDEO_MERGE" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

</div>

</body>
</html>
